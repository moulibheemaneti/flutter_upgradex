name: Bug report
description: Something isn't working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `flutter_upgradex` from a Flutter project root
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `flutter --version` and `dart --version` and paste the output.
      render: shell
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: flutter_upgradex version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or stack trace
      render: shell

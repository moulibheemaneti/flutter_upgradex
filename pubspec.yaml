name: flutter_upgradex
description: >-
  Upgrade your Flutter dependencies one by one — safely. Walks through every
  dependency in pubspec.yaml, upgrades each to its latest pub.dev version, runs
  flutter analyze, and rolls back any package that breaks your project.
repository: https://github.com/moulibheemaneti/flutter_upgradex
homepage: https://github.com/moulibheemaneti/flutter_upgradex
issue_tracker: https://github.com/moulibheemaneti/flutter_upgradex/issues
version: 0.0.2

topics:
  - cli
  - flutter
  - developer-tools
  - dependencies
  - upgrade

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.2
  dart_husky: ^1.6.0

executables:
  flutter_upgradex: main

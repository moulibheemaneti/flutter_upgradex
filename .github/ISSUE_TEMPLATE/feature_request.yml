name: Feature request
description: Suggest a new flag, wizard step, or behaviour.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe it below. The more context you give, the easier it is to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you hit this limitation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Any workarounds or other approaches you thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
